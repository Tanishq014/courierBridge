services:
  - type: web
    name: courierbridge
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: COURIERBRIDGE_DATABASE_URL
        sync: false
      - key: COURIERBRIDGE_REQUIRE_AUTH
        value: true
      - key: COURIERBRIDGE_ACCESS_PASSWORD
        sync: false
      - key: COURIERBRIDGE_SECRET_KEY
        sync: false
