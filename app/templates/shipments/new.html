{% extends "base.html" %}

{% block title %}New Shipment | CourierBridge{% endblock %}

{% block content %}
<header class="page-header compact-page-header">
    <div class="page-heading">
        <div class="heading-with-date">
            <h1>Create new booking</h1>
            <div class="form-group inline-date page-inline-date">
                <input form="new-shipment-form" type="date" name="booking_date" value="{{ today }}" required aria-label="Booking date" title="Booking date">
            </div>
        </div>
    </div>
    <div class="page-actions"><a href="/shipments" class="btn btn-secondary">Cancel</a></div>
</header>

<div class="card form-card">
    <form method="POST" action="/shipments/new" class="shipment-form compact-shipment-form" id="new-shipment-form">

        <div class="form-section-title">
            <h3>Sender & Receiver</h3>
        </div>
        <div class="grid-4">
            <div class="form-group">
                <label>Sender Phone</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="customer_phone" placeholder="e.g. 9876543210">
            </div>
            <div class="form-group">
                <label>Sender Name <span class="required">*</span></label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="customer_name" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Receiver Name</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="receiver_name" placeholder="e.g. Jane Smith">
            </div>
            <div class="form-group">
                <label>Address Line 1</label>
                <textarea autocomplete="new-password" spellcheck="false" class="auto-grow address-input" rows="1" name="receiver_address_line_1" placeholder="House / building"></textarea>
            </div>
        </div>
        <div class="grid-4">
            <div class="form-group">
                <label>Address Line 2</label>
                <textarea autocomplete="new-password" spellcheck="false" class="auto-grow address-input" rows="1" name="receiver_address_line_2" placeholder="Street / area"></textarea>
            </div>
            <div class="form-group">
                <label>Address Line 3</label>
                <textarea autocomplete="new-password" spellcheck="false" class="auto-grow address-input" rows="1" name="receiver_address_line_3" placeholder="Landmark / optional"></textarea>
            </div>
            <div class="form-group">
                <label>Receiver City</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="destination_city" placeholder="e.g. Toronto">
            </div>
            <div class="form-group">
                <label>Receiver State</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="receiver_state" placeholder="e.g. Ontario">
            </div>
        </div>
        <div class="grid-4">
            <div class="form-group">
                <label>Receiver ZIP</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="receiver_zip" placeholder="e.g. M5V 2T6">
            </div>
            <div class="form-group">
                <label>Destination Country <span class="required">*</span></label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="destination_country" class="country-normalized-input" list="destination-country-options" placeholder="Search country" required>
            </div>
            <div class="form-group">
                <label>Receiver Phone</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="contact_or_reference_raw" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Raw Items</label>
                <textarea autocomplete="new-password" spellcheck="false" name="item_raw_text" class="auto-grow item-raw-input" rows="1" placeholder="Paste item list here"></textarea>
            </div>
        </div>

        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-top: 2rem;">Weight & Rates</h3>
        <div style="display: grid; grid-template-columns: repeat(8, minmax(0, 1fr)); gap: 0.5rem;">
            <div class="form-group">
                <label>Dead Weight</label>
                <input type="number" step="0.01" name="dead_weight" id="dead_weight" value="0.0">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label style="display: flex; justify-content: space-between; align-items: center;">
                    Volumetric L W H
                    <span class="field-hint" style="font-size: 0.75rem; font-weight: normal; margin: 0;">(Vol: <span id="volumetric_display">0.00</span>)</span>
                </label>
                <div class="dimension-inputs" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.25rem;">
                    <input type="number" step="0.01" name="volumetric_length" id="volumetric_length" placeholder="L" aria-label="Volumetric length">
                    <input type="number" step="0.01" name="volumetric_width" id="volumetric_width" placeholder="W" aria-label="Volumetric width">
                    <input type="number" step="0.01" name="volumetric_height" id="volumetric_height" placeholder="H" aria-label="Volumetric height">
                </div>
                <input type="hidden" name="volumetric_weight" id="volumetric_weight" value="0.0">
            </div>
            <div class="form-group">
                <label>Weight Basis</label>
                <input type="hidden" name="weight_basis" id="weight_basis" value="actual">
                <input type="text" id="weight_basis_display" value="Actual" readonly style="font-size: 0.85rem; padding: 0.4rem;">
            </div>
            <div class="form-group">
                <label>Customer Charged Weight</label>
                <input type="number" step="0.01" name="customer_charged_weight" id="customer_charged_weight" placeholder="23">
            </div>
            <div class="form-group">
                <label>Customer Charged Rate</label>
                <input type="number" step="0.01" name="customer_rate_text" id="customer_rate_text" placeholder="600">
            </div>
            <div class="form-group">
                <label>Self Charged Weight</label>
                <input type="number" step="0.01" name="vendor_charged_weight" id="vendor_charged_weight" placeholder="21">
            </div>
            <div class="form-group">
                <label>Self Charged Rate</label>
                <input type="number" step="0.01" name="vendor_rate_text" id="vendor_rate_text" placeholder="602">
            </div>
        </div>

        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-top: 2rem;">Tracking & Status</h3>
        <div style="display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 0.5rem;">
            <div class="form-group">
                <label>Handed over to</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="vendor_partner" placeholder="e.g. Nikhil, Self">
            </div>
            <div class="form-group">
                <label>First Courier Company <span class="required">*</span></label>
                <select name="main_tracking_courier" id="main_tracking_courier" required>
                    <option value="">Select courier</option>
                    {% for courier in courier_options %}<option value="{{ courier }}">{{ courier }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>First Courier Number</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="main_tracking_number" placeholder="e.g. 1234567890">
            </div>
            <div class="form-group">
                <label>Last Mile (LM) Courier</label>
                <select name="lm_awb_courier">
                    <option value="">Select courier</option>
                    {% for courier in courier_options %}<option value="{{ courier }}">{{ courier }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Last Mile (LM) AWB Number</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="lm_awb_number" placeholder="e.g. LM123456">
            </div>
            <div class="form-group">
                <label>Current Status</label>
                <select name="overall_status">
                    <option value="booked">Booked</option>
                    <option value="packed">Packed</option>
                    <option value="bagged">Bagged</option>
                    <option value="in_scan">In Scan</option>
                    <option value="bagging">Bagging</option>
                    <option value="received">Received</option>
                    <option value="in_transit">In Transit</option>
                    <option value="customs">Customs</option>
                    <option value="hand_over_to_airline">Hand over to airline</option>
                    <option value="at_destination">At destination</option>
                    <option value="custom_clearance">Custom Clearance</option>
                    <option value="at_lm_partner">At LM Partner</option>
                    <option value="out_for_delivery">Out for Delivery</option>
                    <option value="undelivered">Undelivered</option>
                    <option value="delivered">Delivered</option>
                    <option value="rto">RTO</option>
                    <option value="return_damage">Return/Damage</option>
                    <option value="exception">Exception</option>
                    <option value="unknown">Unknown</option>
                </select>
            </div>
        </div>
        <div class="grid-4">
            <div class="form-group">
                <label>Promised Days</label>
                <input type="number" name="promised_days_number" placeholder="Days">
            </div>
            <div class="form-group" style="grid-column: span 3;">
                <label>Status Notes</label>
                <input autocomplete="new-password" spellcheck="false" type="text" name="status_raw_text" placeholder="e.g. Customer asked to hold, pending customs, follow-up needed">
            </div>
        </div>
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" name="requires_lm_awb" value="true" style="width: auto;">
                <label style="margin: 0; font-weight: 500;">Final delivery tracking pending</label>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" name="custom_duty" value="true" style="width: auto;">
                <label style="margin: 0; font-weight: 500;">Custom duty</label>
            </div>
        </div>

        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-top: 2rem;">Money</h3>
        <div class="money-grid">
            <div class="form-group">
                <label>Billed Amount (Customer)</label>
                <input type="number" step="0.01" name="billed_amount" value="0.0" id="billed_amount">
            </div>
            <div class="form-group">
                <label>Received Amount (Paid)</label>
                <input type="number" step="0.01" name="received_amount" value="0.0" id="received_amount">
            </div>
            <div class="form-group" style="color: var(--danger-text); font-weight: bold;">
                Balance: <span id="balance_display">0.00</span>
            </div>
            <div class="form-group">
                <label>Self Cost</label>
                <input type="number" step="0.01" name="self_cost" value="0.0" id="self_cost">
            </div>
            <div class="form-group">
                <label>Other Expense</label>
                <input type="number" step="0.01" name="other_expense" value="0.0" id="other_expense">
            </div>
            <div class="form-group" style="font-weight: bold;">
                Profit: <span id="profit_display">0.00</span>
            </div>
        </div>

        <h3 style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-top: 2rem;">Status & Notes</h3>
        <div class="form-group">
            <label>Booking Notes</label>
            <textarea autocomplete="new-password" spellcheck="false" class="auto-grow large-notes" rows="4" name="internal_notes" placeholder="Add customer, balance, or internal notes here"></textarea>
        </div>

        <div class="form-actions">
            <a href="/shipments" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Create new booking</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const billedInput = document.getElementById('billed_amount');
    const receivedInput = document.getElementById('received_amount');
    const selfCostInput = document.getElementById('self_cost');
    const otherExpInput = document.getElementById('other_expense');

    const balanceDisplay = document.getElementById('balance_display');
    const profitDisplay = document.getElementById('profit_display');

    function updateCalculations() {
        const billed = parseFloat(billedInput.value) || 0;
        const received = parseFloat(receivedInput.value) || 0;
        const selfCost = parseFloat(selfCostInput.value) || 0;
        const otherExp = parseFloat(otherExpInput.value) || 0;

        balanceDisplay.textContent = (billed - received).toFixed(2);

        const profit = billed - selfCost - otherExp;
        profitDisplay.textContent = profit.toFixed(2);

        const profitContainer = profitDisplay.parentElement;
        if (profit > 0) {
            profitContainer.style.color = 'var(--success-text)';
        } else if (profit < 0) {
            profitContainer.style.color = 'var(--danger-text)';
        } else {
            profitContainer.style.color = 'inherit';
        }
    }

    billedInput.addEventListener('input', updateCalculations);
    receivedInput.addEventListener('input', updateCalculations);
    selfCostInput.addEventListener('input', updateCalculations);
    otherExpInput.addEventListener('input', updateCalculations);

    function moveFocus(current, direction) {
        const form = current.form;
        if (!form) return;
        const elements = Array.from(form.elements).filter(el => !el.disabled && el.type !== 'hidden' && el.tabIndex !== -1);

        if (direction === 'next') {
            const index = elements.indexOf(current);
            if (index > -1 && index < elements.length - 1) elements[index + 1].focus();
            return;
        }

        const currentRect = current.getBoundingClientRect();
        let bestMatch = null;
        let minDistance = Infinity;

        elements.forEach(el => {
            if (el === current) return;
            const rect = el.getBoundingClientRect();
            let isCandidate = false;
            let distance = 0;

            const currentCenter = { x: currentRect.left + currentRect.width / 2, y: currentRect.top + currentRect.height / 2 };
            const elCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };

            if (direction === 'ArrowDown') {
                if (elCenter.y > currentCenter.y + 10) {
                    if (Math.abs(elCenter.x - currentCenter.x) < currentRect.width / 1.5) {
                        isCandidate = true; distance = elCenter.y - currentCenter.y;
                    }
                }
            } else if (direction === 'ArrowUp') {
                if (elCenter.y < currentCenter.y - 10) {
                    if (Math.abs(elCenter.x - currentCenter.x) < currentRect.width / 1.5) {
                        isCandidate = true; distance = currentCenter.y - elCenter.y;
                    }
                }
            } else if (direction === 'ArrowRight') {
                if (elCenter.x > currentCenter.x + 10) {
                    if (Math.abs(elCenter.y - currentCenter.y) < currentRect.height) {
                        isCandidate = true; distance = elCenter.x - currentCenter.x;
                    }
                }
            } else if (direction === 'ArrowLeft') {
                if (elCenter.x < currentCenter.x - 10) {
                    if (Math.abs(elCenter.y - currentCenter.y) < currentRect.height) {
                        isCandidate = true; distance = currentCenter.x - elCenter.x;
                    }
                }
            }

            if (isCandidate && distance < minDistance) {
                minDistance = distance;
                bestMatch = el;
            }
        });

        if (!bestMatch) {
            const index = elements.indexOf(current);
            if (direction === 'ArrowRight' && index < elements.length - 1) bestMatch = elements[index + 1];
            else if (direction === 'ArrowLeft' && index > 0) bestMatch = elements[index - 1];
            else if (direction === 'ArrowDown' && index < elements.length - 1) bestMatch = elements[index + 1];
            else if (direction === 'ArrowUp' && index > 0) bestMatch = elements[index - 1];
        }

        if (bestMatch) bestMatch.focus();
    }

    // Handle Enter and Arrow keys for spatial navigation
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'TEXTAREA') return;

        if (e.key === 'Enter' && e.target.type !== 'submit' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
            moveFocus(e.target, 'next');
            return;
        }

        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            if (e.target.tagName === 'TEXTAREA') return;
            if (e.target.tagName === 'SELECT') return;

            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                let isAtBoundary = false;
                try {
                    const isFullySelected = e.target.selectionStart === 0 && e.target.selectionEnd === e.target.value.length && e.target.value.length > 0;
                    if (isFullySelected || !e.target.value) {
                        isAtBoundary = true;
                    } else if (e.key === 'ArrowRight' && e.target.selectionStart === e.target.value.length) {
                        isAtBoundary = true;
                    } else if (e.key === 'ArrowLeft' && e.target.selectionEnd === 0) {
                        isAtBoundary = true;
                    }
                } catch (err) {
                    if (!e.target.value) isAtBoundary = true;
                }
                if (!isAtBoundary) return;
            }
            e.preventDefault();
            moveFocus(e.target, e.key);
        }
    });

    // Auto-select text on focus
    document.addEventListener('focusin', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            try {
                e.target.select();
            } catch (err) {
                // Ignore errors on input types that don't support selection (like date)
            }
        }
    });

    function resizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    document.querySelectorAll('textarea.auto-grow').forEach(textarea => {
        resizeTextarea(textarea);
        textarea.addEventListener('input', () => resizeTextarea(textarea));
    });

    function numericValue(id) {
        const field = document.getElementById(id);
        return field ? (parseFloat(field.value) || 0) : 0;
    }

    function updateWeightBasis() {
        const length = numericValue('volumetric_length');
        const width = numericValue('volumetric_width');
        const height = numericValue('volumetric_height');
        const deadWeight = numericValue('dead_weight');
        const volumetricInput = document.getElementById('volumetric_weight');
        const existingVolumetric = volumetricInput ? (parseFloat(volumetricInput.value) || 0) : 0;
        const volumetric = length && width && height ? (length * width * height) / 5000 : existingVolumetric;
        const basis = volumetric > deadWeight ? 'volumetric' : 'actual';
        const volumetricDisplay = document.getElementById('volumetric_display');
        const basisInput = document.getElementById('weight_basis');
        const basisDisplay = document.getElementById('weight_basis_display');
        if (volumetricInput && length && width && height) volumetricInput.value = volumetric.toFixed(2);
        if (volumetricDisplay) volumetricDisplay.textContent = volumetric.toFixed(2);
        if (basisInput) basisInput.value = basis;
        if (basisDisplay) basisDisplay.value = basis === 'volumetric' ? 'Volumetric' : 'Actual';
    }

    let billedManuallyEdited = false;
    let selfCostManuallyEdited = false;

    if (billedInput) {
        billedInput.addEventListener('input', () => { billedManuallyEdited = true; updateCalculations(); });
    }
    if (selfCostInput) {
        selfCostInput.addEventListener('input', () => { selfCostManuallyEdited = true; updateCalculations(); });
    }

    function extractRateJS(text) {
        if (!text) return 0;
        let match = text.toLowerCase().match(/(\d+(?:\.\d+)?)\s*(?:\/kg|per\s*kg|kg)/);
        if (match) return parseFloat(match[1]);
        let matchPlain = text.match(/^\s*(\d+(?:\.\d+)?)\s*$/);
        if (matchPlain) return parseFloat(matchPlain[1]);
        return 0;
    }

    function updateRateAmounts() {
        const customerWeight = document.getElementById('customer_charged_weight');
        const customerRate = document.getElementById('customer_rate_text');
        const vendorWeight = document.getElementById('vendor_charged_weight');
        const vendorRate = document.getElementById('vendor_rate_text');

        if (!billedManuallyEdited && customerWeight && customerRate && billedInput && (customerWeight.value || customerRate.value)) {
            const amount = (parseFloat(customerWeight.value) || 0) * extractRateJS(customerRate.value);
            billedInput.value = amount ? amount.toFixed(2) : '0.00';
        }
        if (!selfCostManuallyEdited && vendorWeight && vendorRate && selfCostInput && (vendorWeight.value || vendorRate.value)) {
            const amount = (parseFloat(vendorWeight.value) || 0) * extractRateJS(vendorRate.value);
            selfCostInput.value = amount ? amount.toFixed(2) : '0.00';
        }
        updateCalculations();
    }

    ['dead_weight', 'volumetric_length', 'volumetric_width', 'volumetric_height'].forEach(id => {
        const field = document.getElementById(id);
        if (field) {
            field.addEventListener('input', updateWeightBasis);
            field.addEventListener('change', updateWeightBasis);
        }
    });

    ['customer_charged_weight', 'customer_rate_text', 'vendor_charged_weight', 'vendor_rate_text'].forEach(id => {
        const field = document.getElementById(id);
        if (field) {
            field.addEventListener('input', updateRateAmounts);
            field.addEventListener('change', updateRateAmounts);
        }
    });

    updateWeightBasis();
    updateCalculations();
    function normalizeCountryInput(field) {
        field.value = field.value.toUpperCase();
    }
    document.querySelectorAll('.country-normalized-input').forEach(field => {
        field.addEventListener('input', () => normalizeCountryInput(field));
        field.addEventListener('change', () => normalizeCountryInput(field));
    });
</script>
{% endblock %}
