<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#123b30">
    <title>{% block title %}CourierBridge{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    {% set path = request.url.path %}
    <div class="app-shell">
        <aside class="sidebar" id="app-sidebar">
            <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">Hide</button>
            <a href="/" class="brand">
                <span class="brand-copy">
                    <span class="brand-name">CourierBridge</span>
                    <span class="brand-tagline">Operations desk</span>
                </span>
            </a>

            <div class="nav-label">Workspace</div>
            <nav class="nav-list" aria-label="Primary navigation">
                <a href="/" class="nav-link {% if path == '/' %}active{% endif %}">
                    Dashboard
                </a>
                <a href="/shipments" class="nav-link {% if path.startswith('/shipments') and path != '/shipments/new' %}active{% endif %}">
                    Shipments
                </a>
                <a href="/customers" class="nav-link {% if path.startswith('/customers') %}active{% endif %}">
                    Customers
                </a>
                <a href="/tools/quick-add" class="nav-link {% if path.startswith('/tools') %}active{% endif %}">
                    Quick add
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="system-status">
                    <span class="status-dot"></span>
                    Local workspace online
                </div>
            </div>
            <div class="sidebar-resizer" id="sidebar-resizer" aria-hidden="true"></div>
        </aside>

        <main class="main-area">
            <header class="mobile-header">
                <a href="/" class="mobile-brand">CourierBridge</a>
                <nav class="mobile-nav" aria-label="Mobile navigation">
                    <a href="/" class="{% if path == '/' %}active{% endif %}">Home</a>
                    <a href="/shipments" class="{% if path.startswith('/shipments') %}active{% endif %}">Shipments</a>
                    <a href="/customers" class="{% if path.startswith('/customers') %}active{% endif %}">Customers</a>
                </nav>
            </header>

            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block scripts %}{% endblock %}
    <script>
        (() => {
            const root = document.documentElement;
            const sidebar = document.getElementById('app-sidebar');
            const toggle = document.getElementById('sidebar-toggle');
            const resizer = document.getElementById('sidebar-resizer');
            if (!sidebar || !toggle || !resizer) return;

            const savedWidth = localStorage.getItem('courierbridge.sidebarWidth');
            const savedCollapsed = localStorage.getItem('courierbridge.sidebarCollapsed') === 'true';
            if (savedWidth) {
                root.style.setProperty('--sidebar-width', savedWidth + 'px');
                root.style.setProperty('--sidebar-expanded-width', savedWidth + 'px');
            }
            if (savedCollapsed) document.body.classList.add('sidebar-collapsed');
            toggle.textContent = savedCollapsed ? 'Show' : 'Hide';

            const setSidebarHover = hovering => {
                if (document.body.classList.contains('sidebar-collapsed') && hovering) {
                    document.body.classList.add('sidebar-hovering');
                } else {
                    document.body.classList.remove('sidebar-hovering');
                }
            };

            sidebar.addEventListener('pointermove', event => {
                if (!document.body.classList.contains('sidebar-collapsed')) return;
                if (document.body.classList.contains('sidebar-hovering')) return;
                const collapsedWidth = parseInt(getComputedStyle(root).getPropertyValue('--sidebar-collapsed-width'), 10) || 58;
                if (event.clientX <= collapsedWidth) setSidebarHover(true);
            });
            sidebar.addEventListener('mouseleave', () => setSidebarHover(false));

            toggle.addEventListener('click', () => {
                const collapsed = document.body.classList.toggle('sidebar-collapsed');
                localStorage.setItem('courierbridge.sidebarCollapsed', String(collapsed));
                toggle.textContent = collapsed ? 'Show' : 'Hide';
                setSidebarHover(false);
            });

            resizer.addEventListener('pointerdown', event => {
                if (document.body.classList.contains('sidebar-collapsed')) return;
                event.preventDefault();
                resizer.setPointerCapture(event.pointerId);
                const onMove = moveEvent => {
                    const width = Math.min(360, Math.max(160, moveEvent.clientX));
                    root.style.setProperty('--sidebar-width', width + 'px');
                    root.style.setProperty('--sidebar-expanded-width', width + 'px');
                    localStorage.setItem('courierbridge.sidebarWidth', String(width));
                };
                const onUp = upEvent => {
                    resizer.releasePointerCapture(upEvent.pointerId);
                    resizer.removeEventListener('pointermove', onMove);
                    resizer.removeEventListener('pointerup', onUp);
                };
                resizer.addEventListener('pointermove', onMove);
                resizer.addEventListener('pointerup', onUp);
            });
        })();
    </script></body>
</html>
