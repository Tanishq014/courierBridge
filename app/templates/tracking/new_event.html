{% extends "base.html" %}

{% block title %}Add Tracking Event | CourierBridge{% endblock %}

{% block content %}
<header class="page-header">
    <div class="page-heading">
        <div class="eyebrow">Shipment #{{ shipment_id }}</div>
        <h1>Add tracking event</h1>
        <p class="page-description">Record a carrier movement or manual operational update.</p>
    </div>
    <div class="page-actions"><a href="/shipments/{{ shipment_id }}" class="btn btn-secondary">Cancel</a></div>
</header>

<section class="card" style="max-width: 680px;">
    <form method="POST" action="/tracking/event/new">
        <input type="hidden" name="shipment_id" value="{{ shipment_id }}">
        <div class="form-group">
            <label>Status <span class="required">*</span></label>
            <input autocomplete="new-password" spellcheck="false" type="text" name="status_text" placeholder="e.g. Arrived at destination hub" required autofocus>
            <span class="field-hint">Use the carrier's wording where possible.</span>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input autocomplete="new-password" spellcheck="false" type="text" name="location" placeholder="City, airport, or sorting hub">
        </div>
        <div class="form-group">
            <label>Status type <span class="required">*</span></label>
            <select name="normalized_status">
                <option value="booked">Booked</option>
                <option value="packed">Packed</option>
                <option value="bagged">Bagged</option>
                <option value="in_scan">In Scan</option>
                <option value="bagging">Bagging</option>
                <option value="received">Received</option>
                <option value="in_transit" selected>In transit</option>
                <option value="customs">Customs</option>
                <option value="hand_over_to_airline">Hand over to airline</option>
                <option value="at_destination">At destination</option>
                <option value="custom_clearance">Custom Clearance</option>
                <option value="at_lm_partner">At LM partner</option>
                <option value="out_for_delivery">Out for delivery</option>
                <option value="undelivered">Undelivered</option>
                <option value="delivered">Delivered</option>
                <option value="rto">RTO</option>
                <option value="return_damage">Return / damage</option>
                <option value="exception">Exception</option>
                <option value="unknown">Unknown</option>
            </select>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea autocomplete="new-password" spellcheck="false" name="notes" rows="4" class="auto-grow" placeholder="Add notes saved with this timeline update"></textarea>
        </div>
        <div class="form-actions" style="margin: 20px -22px -22px;">
            <a href="/shipments/{{ shipment_id }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Add event</button>
        </div>
    </form>
</section>
{% endblock %}
